<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <section class="container">
        <div class="service-package">
          <div class="service-intro">
            <h2 class="title">Cơ bản</h2>
            <p class="price">Miễn phí</p>
            <ul class="feature">
              <li>1 Dự án</li>
              <li>100MB Lưu trữ</li>
              <li>Hỗ trợ Email</li>
            </ul>
            <button class="btn">Bắt đầu ngay</button>
          </div>
          <div class="service-intro">
            <h2 class="title">Chuyên nghiệp</h2>
            <p class="price">99.000đ/th</p>
            <ul class="feature">
              <li>Dự án Không giới hạn</li>
              <li>10GB Lưu trữ</li>
              <li>Hỗ trợ 24/7</li>
              <li>Domain Tùy chỉnh</li>
            </ul>
            <button class="btn">Nâng cấp</button>
          </div>
          <div class="service-intro">
            <h2 class="title">Doanh nghiệp</h2>
            <p class="price">Liên hệ</p>
            <ul class="feature">
              <li>Gói tùy chọn đầy đủ</li>
              <li>Dung lượng cao nhất</li>
              <li>Tư vấn riêng biệt</li>
            </ul>
            <button class="btn">Tìm hiểu thêm</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
