<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>
  <body>
    <div
      class="min-h-screen bg-gray-50 dark:bg-slate-900 transition-colors duration-500 py-10 flex items-center justify-center relative"
    >
      <div
        class="w-80 bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 text-center transition-colors duration-500"
      >
        <h3 class="text-xl font-bold text-gray-800 dark:text-white">
          Tour Đà Lạt
        </h3>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1 mb-6">
          3 Ngày 2 Đêm
        </p>

        <div class="text-3xl font-extrabold text-blue-600 mb-6">
          2.500.000đ
          <span class="text-sm font-normal text-gray-500 dark:text-gray-400"
            >/khách</span
          >
        </div>

        <div class="px-4">
          <div
            class="text-sm text-left text-gray-600 dark:text-gray-200 font-bold mb-8 space-y-3"
          >
            <p>Khách sạn 4 sao trung tâm</p>
            <p>Xe Limousine đưa đón tận nơi</p>
            <p>Vé tham quan tất cả các điểm</p>
          </div>
        </div>

        <button
          class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition"
        >
          ĐẶT TOUR NGAY
        </button>
      </div>

      <button
        onclick="doiGiaoDien()"
        class="absolute bottom-8 right-8 px-5 py-2 bg-white dark:bg-slate-800 text-gray-700 dark:text-gray-50 rounded-full font-semibold shadow-md transition-colors duration-300"
      >
        Đổi Giao Diện
      </button>
    </div>

    <script>
      function doiGiaoDien() {
        document.documentElement.classList.toggle("dark");
      }
    </script>
  </body>
</html>
