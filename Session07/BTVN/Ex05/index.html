<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <h2 class="text-3xl font-bold text-center my-10">Các Tour Nổi Bật</h2>

    <div class="grid grid-cols-3 gap-8 px-10">
      <div class="rounded-lg shadow-md overflow-hidden bg-white">
        <img
          src="https://images.unsplash.com/photo-1528181304800-259b08848526?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80"
          alt="Thái Lan"
          class="w-full h-56 object-cover brightness-110"
        />

        <div class="p-5 text-center">
          <h3 class="text-xl font-bold text-gray-800">Thái Lan</h3>
          <p class="text-sm text-gray-500 mt-1">Xứ sở chùa vàng</p>
        </div>
      </div>

      <div class="rounded-lg shadow-md overflow-hidden bg-white">
        <img
          src="https://kenh14cdn.com/thumb_w/660/2019/9/19/photo-1540959733332-eab4deabeeaf-1568907830559284178472.jpeg"
          alt="Nhật Bản"
          class="w-full h-56 object-cover brightness-110"
        />

        <div class="p-5 text-center">
          <h3 class="text-xl font-bold text-gray-800">Nhật Bản</h3>
          <p class="text-sm text-gray-500 mt-1">Hoa anh đào rực rỡ</p>
        </div>
      </div>

      <div class="rounded-lg shadow-md overflow-hidden bg-white">
        <img
          src="https://www.thedreamytraveller.com/wp-content/uploads/2024/04/dao-choi-paris.jpg"
          alt="Pháp"
          class="w-full h-56 object-cover brightness-110"
        />

        <div class="p-5 text-center">
          <h3 class="text-xl font-bold text-gray-800">Pháp</h3>
          <p class="text-sm text-gray-500 mt-1">Kinh đô ánh sáng</p>
        </div>
      </div>
    </div>
  </body>
</html>
