<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-4xl mx-auto mt-10">
      <form action="" class="grid grid-cols-1 md:grid-cols-5 gap-6 items-end">
        <div class="md:col-span-2">
          <label for="" class="block font-bold text-gray-700 mb-2"
            >Điểm đến</label
          >
          <input
            type="text"
            class="w-full border border-gray-300 px-4 py-2 rounded-md outline-none focus:border-blue-500"
            placeholder="Bạn muốn đi đâu?"
          />
        </div>

        <div class="md:col-span-2">
          <label for="" class="block font-bold text-gray-700 mb-2"
            >Ngày đi</label
          >
          <input
            type="date"
            class="w-full border border-gray-300 px-4 py-2 rounded-md outline-none focus:border-blue-500"
            placeholder="Bạn muốn đi đâu?"
          />
        </div>

        <button
          type="button"
          class="col-span-1 w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition"
        >
          Tìm kiếm
        </button>
      </form>
    </div>
  </body>
</html>
