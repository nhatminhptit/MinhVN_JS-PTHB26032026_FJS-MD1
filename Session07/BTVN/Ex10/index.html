<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="min-h-screen flex bg-slate-50 font-sans">
      <aside class="w-64 bg-slate-900 text-white hidden md:block">
        <div
          class="p-6 font-bold text-xl text-center border-b border-slate-800"
        >
          TechGadget Admin
        </div>
        <nav class="p-4 space-y-2">
          <a
            href="#"
            class="block px-4 py-2 bg-blue-600 rounded-lg text-sm font-semibold"
            >Tổng quan</a
          >
          <a
            href="#"
            class="block px-4 py-2 hover:bg-slate-800 rounded-lg text-sm transition"
            >Đơn hàng</a
          >
          <a
            href="#"
            class="block px-4 py-2 hover:bg-slate-800 rounded-lg text-sm transition"
            >Sản phẩm</a
          >
          <a
            href="#"
            class="block px-4 py-2 hover:bg-slate-800 rounded-lg text-sm transition"
            >Khách hàng</a
          >
        </nav>
      </aside>

      <main class="flex-grow p-8">
        <div class="mb-8">
          <input
            type="text"
            placeholder="Tìm kiếm mã đơn hàng, sản phẩm..."
            class="w-full max-w-md px-4 py-2 border border-gray-200 rounded-lg transition-all duration-300 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
          />
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-6">
          Tổng quan hệ thống
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 mb-2">Tổng doanh thu</p>
            <h3 class="text-2xl font-bold text-gray-900">125.000.000 đ</h3>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 mb-2">Đơn hàng mới</p>
            <h3 class="text-2xl font-bold text-gray-900">342</h3>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 mb-2">Khách hàng truy cập</p>
            <h3 class="text-2xl font-bold text-gray-900">1,204</h3>
          </div>

          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <p class="text-sm text-gray-500 mb-2">Tỉ lệ chuyển đổi</p>
            <h3 class="text-2xl font-bold text-gray-900">4.5%</h3>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
