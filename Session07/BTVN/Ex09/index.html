<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div class="py-16 px-6 font-sans">
      <h2 class="text-3xl text-center text-gray-800 font-bold mb-10">
        Dịch Vụ Đi Kèm
      </h2>

      <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-6">
        <div
          class="group bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex justify-center items-center mb-5 transition-colors duration-300 group-hover:bg-blue-600 group-hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
              ></path>
            </svg>
          </div>

          <h4 class="text-lg text-gray-800 font-bold mb-2">Khách Sạn</h4>
          <p class="text-sm text-gray-500 leading-relaxed">
            Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.
          </p>
        </div>

        <div
          class="group bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex justify-center items-center mb-5 transition-colors duration-300 group-hover:bg-blue-600 group-hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              ></path>
            </svg>
          </div>

          <h4 class="text-lg text-gray-800 font-bold mb-2">Vé Máy Bay</h4>
          <p class="text-sm text-gray-500 leading-relaxed">
            Đối tác từ các hãng hàng không hàng đầu thế giới.
          </p>
        </div>

        <div
          class="group bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex justify-center items-center mb-5 transition-colors duration-300 group-hover:bg-blue-600 group-hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.956 11.956 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
              ></path>
            </svg>
          </div>

          <h4 class="text-lg text-gray-800 font-bold mb-2">Bảo Hiểm</h4>
          <p class="text-sm text-gray-500 leading-relaxed">
            Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.
          </p>
        </div>

        <div
          class="group bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex justify-center items-center mb-5 transition-colors duration-300 group-hover:bg-blue-600 group-hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
              ></path>
            </svg>
          </div>

          <h4 class="text-lg text-gray-800 font-bold mb-2">Hướng Dẫn</h4>
          <p class="text-sm text-gray-500 leading-relaxed">
            Dội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
