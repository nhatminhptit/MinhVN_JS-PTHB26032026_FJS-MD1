<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="products-list">
          <p>Hàng 1: Sử dụng display: none;</p>
          <div class="first-product box col">Sản phẩm 1</div>
          <div class="second-product box col" style="display: none">
            Sản phẩm 2
          </div>
          <div class="third-product box col">Sản phẩm 3</div>
        </div>
        <div class="products-list">
          <p>Hàng 2: Sử dụng visibility: hidden;</p>
          <div class="first-product box col">Sản phẩm 4</div>
          <div class="second-product box col" style="visibility: hidden">
            Sản phẩm 5
          </div>
          <div class="third-product box col">Sản phẩm 6</div>
        </div>
      </div>
    </main>
  </body>
</html>
