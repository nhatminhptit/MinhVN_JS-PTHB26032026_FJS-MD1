    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="enroll">
        <h3 class="enroll-title">Đăng ký nhận khuyến mãi!</h3>

          Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ" mới
          nhất từ chúng tôi
        </p>
        <form class="enroll-form" action="">
          <input
            class="enroll-input"
            type="text"
            placeholder="Nhập địa chỉ email..."
          />
          <input class="enroll-btn" type="button" value="Đăng kí ngay" />
        </form>
      </div>
    </main>
  </body>
