<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <form action="" style="line-height: 2;">
            <h1>Đăng Ký Đặt Vé Sự Kiện Âm Nhạc</h1>

            <label for="name">Họ và tên:</label>
            <input type="text" name="name" id="name" placeholder="Nhập họ và tên..." required minlength="3"
                maxlength="50">

            <br>

            <label for="ticket_quantity">Số lượng vé:</label>
            <input type="number" name="ticket_quantity" id="ticket_quantity" min="1" max="5">

            <br>

            <label for="vip_code">Mã vé VIP (Đã cấp sẵn):</label>
            <input type="text" name="vip_code" id="vip_code" value="MUSIC-VIP-2026" readonly>

            <br>

            <label for="local_voucher">Mã giảm giá nội bộ:</label>
            <input type="text" name="local_voucher" id="local_voucher" value="NOT-ELIGIBLE" disabled>

            <br>

            <input type="submit" name="" id="" value="Xác nhận đặt vé">
        </form>
    </main>
</body>

</html>
