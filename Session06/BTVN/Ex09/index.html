<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Document</title>

    <style>
      :root {
        --bs-primary-rgb: 200, 16, 46;
        --bs-dark-rgb: 51, 51, 51;
      }

      .btn-primary {
        --bs-btn-bg: #c8102e;
        --bs-btn-border-color: #c8102e;
        --bs-btn-hover-bg: #a00d25;
        --bs-btn-hover-border-color: #a00d25;
        --bs-btn-active-bg: #a00d25;
        --bs-btn-active-border-color: #a00d25;
        --bs-btn-focus-shadow-rgb: rgb(160 13 37);
        color: white !important;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="card border-0 border-top border-primary border-4 shadow-sm">
        <div class="row g-0">
          <div class="col-12 col-md-5">
            <img
              src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
              alt=""
              class="img-fluid rounded-start h-100 object-fit-cover"
            />
          </div>
          <div class="col-12 col-md-7">
            <div class="card-body p-4 p-lg-5">
              <h3 class="card-title text-primary fw-bold mb-3">
                Tech Talk: Tương Lai Lập Trình AI
              </h3>
              <p class="card-text text-muted mb-4">
                Tham gia cùng Rikkei Academy để khám phá những xu hướng công
                nghệ AI mới nhất và cách phát triển phần mềm trong tương lai
              </p>
              <p class="mb-1">
                <strong>Thời gian:</strong> 09:00 - 12:00, 25/11/2026
              </p>
              <p class="mb-4">
                <strong>Địa điểm:</strong> Cơ sở Rikkei Academy HN
              </p>
              <button class="btn btn-primary px-4 py-2 me-2 fw-bold">
                Đăng Ký Ngay
              </button>
              <button class="btn btn-outline-dark px-4 py-2 fw-bold">
                Xem Chi Tiết
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
