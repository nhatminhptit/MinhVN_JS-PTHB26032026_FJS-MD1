<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="container mt-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <form class="card p-4 shadow-sm">
            <h4 class="text-center fw-bold mb-4">Thêm Sách Mới</h4>

            <div class="mb-4">
              <label for="name" class="form-label fw-bold">Tên sách</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Nhập tên sách..."
              />
            </div>

            <div class="mb-4">
              <label for="author" class="form-label fw-bold">Tác giả</label>
              <input
                type="text"
                class="form-control"
                id="author"
                placeholder="Nhập tên tác giả..."
              />
            </div>

            <div class="mb-4">
              <label for="genre" class="form-label fw-bold">Thể loại</label>
              <select name="" id="genre" class="form-select" required>
                <option value="" disabled hidden selected>
                  Chọn thể loại...
                </option>
                <option value="">Chính trị</option>
                <option value="">Kinh tế</option>
                <option value="">Văn học</option>
                <option value="">Khoa học</option>
              </select>
            </div>

            <button class="btn btn-primary">Thêm sách</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
